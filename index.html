<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker - Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              500: "#6D28D9",
              600: "#4A00FF",
              700: "#4C1D95"
            }
          },
          boxShadow: {
            soft: "0 10px 35px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <div class="min-h-screen flex items-center justify-center  ">
    <div class="w-full max-w-md rounded-3xl bg-white shadow-soft border border-slate-200 p-6 sm:p-8">
      <div class="text-center">
        <div class="mx-auto mb-4 flex h-20 w-20 items-center justify-center rounded-full bg-slate-100">
          <img src="assets/github-logo.png" alt="">
        </div>

        <h1 class="text-3xl font-bold tracking-tight">GitHub Issues Tracker</h1>
        <p class="mt-2 text-sm text-slate-500">Sign in to manage your issues</p>
      </div>

      <div id="messageBox" class="hidden mt-6 rounded-xl border px-4 py-3 text-sm"></div>

      <form id="loginForm" class="mt-8 space-y-5">
        <div>
          <label for="username" class="mb-2 block text-sm font-medium text-slate-700">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="Enter username"
            class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20"
          />
          <p class="mt-2 text-xs font-medium text-cyan-600">Default: admin</p>
        </div>

        <div>
          <label for="password" class="mb-2 block text-sm font-medium text-slate-700">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter password"
            class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20"
          />
          <p class="mt-2 text-xs font-medium text-cyan-600">Default: admin123</p>
        </div>

        <label class="flex items-center gap-3 text-sm text-slate-600">
          <input id="rememberMe" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-brand-600 focus:ring-brand-500" />
          <span>Remember me</span>
        </label>

        <button
          id="signInBtn"
          type="submit"
          class="w-full rounded-xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white transition  disabled:cursor-not-allowed disabled:opacity-70"
        >
          Sign In
        </button>
      </form>

      <div class="my-6 flex items-center gap-3">
        <div class="h-px flex-1 bg-slate-200"></div>
        <span class="text-sm font-semibold text-slate-400">OR</span>
        <div class="h-px flex-1 bg-slate-200"></div>
      </div>

      <button
        id="demoBtn"
        type="button"
        class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-5 py-5 text-center transition hover:border-brand-300 hover:bg-brand-50"
      >
        <p class="text-lg font-semibold text-slate-700">Demo Credential</p>
        <p class="mt-1 text-sm text-slate-500">Username: <span class="font-semibold">admin</span></p>
        <p class="text-sm text-slate-500">Password: <span class="font-semibold">admin123</span></p>
      </button>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
