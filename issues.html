<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              500: "#6D28D9",
              600: "#4A00FF",
              700: "#4C1D95"
            },
            success: "#10B981",
            closed: "#A855F7"
          },
          boxShadow: {
            soft: "0 10px 35px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-3">
        <div class="flex h-11 w-11 items-center justify-center rounded-2xl ">
          <img src="assets/github-logo.png" alt="">
        </div>

        <div>
          <p class="text-lg font-bold">GitHub Issues Tracker</p>
          <p class="text-xs text-slate-500">Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex w-full max-w-xl flex-col gap-3 sm:w-auto sm:flex-row sm:items-center">
        <form id="searchForm" class="flex w-full items-center gap-2">
          <input
            id="searchInput"
            type="text"
            placeholder="Search issues..."
            class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 sm:w-80"
          />
          <button
            type="submit"
            class="rounded-xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-brand-700"
          >
            Search
          </button>
        </form>

        <button
          id="logoutBtn"
          type="button"
          class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        >
          Logout
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <div class="mb-6">
      <h1 id="pageTitle" class="text-3xl font-bold tracking-tight">All Issues</h1>
    </div>

    <div class="mb-6 flex flex-wrap gap-3">
      <button data-tab="all" class="tab-btn rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold transition">
        All
      </button>
      <button data-tab="open" class="tab-btn rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold transition">
        Open
      </button>
      <button data-tab="closed" class="tab-btn rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold transition">
        Closed
      </button>
    </div>

    <section class="mb-8 rounded-2xl border border-slate-200 bg-white p-5 shadow-soft">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div class="flex items-center gap-4">
          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-100 text-brand-600">
            <img src="assets/Aperture.png" alt="">
          </div>

          <div>
            <h2 id="issueCountText" class="text-2xl font-bold">0 Issues</h2>
            <p class="text-sm text-slate-500">Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex flex-wrap items-center gap-5 text-sm text-slate-600">
          <div class="flex items-center gap-2">
            <span class="h-3 w-3 rounded-full bg-emerald-500"></span>
            <span>Open</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="h-3 w-3 rounded-full bg-purple-500"></span>
            <span>Closed</span>
          </div>
        </div>
      </div>
    </section>

    <div id="statusMessage" class="hidden mb-5 rounded-2xl border px-4 py-3 text-sm"></div>

    <div id="loader" class="hidden py-16">
      <div class="flex flex-col items-center justify-center gap-4">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-brand-200 border-t-brand-600"></div>
        <p class="text-sm font-medium text-slate-500">Loading issues...</p>
      </div>
    </div>

    <div id="issuesGrid" class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-4"></div>

    <div id="emptyState" class="hidden rounded-2xl border border-dashed border-slate-300 bg-white px-6 py-14 text-center">
      <h3 class="text-xl font-semibold text-slate-700">No issues found</h3>
      <p class="mt-2 text-sm text-slate-500">Try another search keyword or change the tab.</p>
    </div>
  </main>

  <!-- Modal -->
<div id="issueModal" class="fixed inset-0 z-50 hidden">
  <!-- Overlay -->
  <div id="modalOverlay" class="absolute inset-0 bg-black/35 backdrop-blur-[1px]"></div>

  <!-- Modal Box -->
  <div class="relative z-10 flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-[540px] rounded-[16px] border border-slate-200 bg-white shadow-[0_20px_60px_rgba(0,0,0,0.18)]">
      
      <!-- Header -->
      <div class="flex items-start justify-between gap-4 px-5 pt-5">
        <div class="min-w-0">
          <h2 id="modalTitle" class="text-[18px] sm:text-[20px] font-bold leading-[1.3] text-slate-800">
            Issue title
          </h2>

          <div id="modalMeta" class="mt-4 flex flex-wrap items-center gap-2 text-[13px] text-slate-500">
            <!-- dynamic -->
          </div>
        </div>

        <button
          id="closeModalBtn"
          type="button"
          class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-white text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div id="modalBody" class="px-5 pt-4 pb-5">
        <div class="flex justify-center py-10">
          <div class="h-10 w-10 animate-spin rounded-full border-4 border-brand-200 border-t-brand-600"></div>
        </div>
      </div>
    </div>
  </div>
</div>

  <script src="./js/auth.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
